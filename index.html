<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Make10B 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0b1120;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  text-align: center;
  padding: 80px 24px 48px;
}
.hero .icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3);
}
.hero h1 {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 16px;
  color: #64748b;
  margin-top: 12px;
}
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 24px;
  width: 100%;
  max-width: 900px;
  padding: 0 24px 80px;
}
.tool-card {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border: 1px solid #1e293b;
  border-radius: 16px;
  padding: 40px 32px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.tool-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}
.tool-card.card-temperature::before { background: linear-gradient(90deg, #f59e0b, #ef4444, #3b82f6); }
.tool-card.card-product::before { background: linear-gradient(90deg, #10b981, #06b6d4); }
.tool-card:hover {
  border-color: #334155;
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
}
.tool-card:hover.card-temperature { box-shadow: 0 16px 48px rgba(245, 158, 11, 0.15); }
.tool-card:hover.card-product { box-shadow: 0 16px 48px rgba(16, 185, 129, 0.15); }
.tool-card .card-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.card-temperature .card-icon { background: rgba(245, 158, 11, 0.15); }
.card-product .card-icon { background: rgba(16, 185, 129, 0.15); }
.tool-card h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.tool-card p {
  font-size: 14px;
  color: #94a3b8;
  line-height: 1.7;
}
.tool-card .card-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #64748b;
  margin-top: auto;
  transition: color 0.3s;
}
.card-temperature:hover .card-tag { color: #f59e0b; }
.card-product:hover .card-tag { color: #10b981; }
.card-tag .arrow {
  display: inline-block;
  transition: transform 0.3s;
}
.tool-card:hover .arrow { transform: translateX(4px); }
footer {
  margin-top: auto;
  padding: 24px;
  text-align: center;
  color: #475569;
  font-size: 13px;
}
.lock-screen {
  position: fixed;
  inset: 0;
  background: #0b1120;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.lock-box {
  text-align: center;
  width: 360px;
  max-width: 90vw;
}
.lock-box .lock-icon {
  font-size: 48px;
  margin-bottom: 20px;
}
.lock-box h2 {
  font-size: 22px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 8px;
}
.lock-box .hint {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 28px;
}
.lock-box input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid #334155;
  border-radius: 12px;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 16px;
  outline: none;
  transition: border-color 0.3s;
  text-align: center;
  letter-spacing: 2px;
}
.lock-box input:focus { border-color: #2563eb; }
.lock-box input::placeholder { color: #475569; letter-spacing: 0; }
.lock-box .error-msg {
  font-size: 13px;
  color: #ef4444;
  margin-top: 10px;
  min-height: 20px;
}
.lock-box button {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.3s;
}
.lock-box button:hover { opacity: 0.9; }
.main-content { display: none; }
.main-content.visible { display: flex; }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">&#x1F512;</div>
    <h2>访问验证</h2>
    <p class="hint">请输入密码以访问工具箱</p>
    <input type="password" id="pwdInput" placeholder="输入密码" autofocus>
    <div class="error-msg" id="errorMsg"></div>
    <button onclick="checkPwd()">验证进入</button>
  </div>
</div>

<div class="main-content" id="mainContent">
<div class="hero">
  <div class="icon">&#x1F6E0;</div>
  <h1>Make10B 工具箱</h1>
  <p class="subtitle">实用工具集，高效解决你的数据分析与展示需求</p>
</div>

<div class="tool-grid">
  <a href="temperature/index.html" class="tool-card card-temperature">
    <div class="card-icon">&#x1F321;</div>
    <h2>全球城市气温对比</h2>
    <p>2025-2026 全球城市气温对比分析报告，包含交互式地图、趋势图表与多城市数据对比，助你洞察全球气候格局。</p>
    <span class="card-tag">进入工具 <span class="arrow">&rarr;</span></span>
  </a>

  <a href="product-catalog/index.html" class="tool-card card-product">
    <div class="card-icon">&#x1F4E6;</div>
    <h2>产品目录展示</h2>
    <p>Purple Leaf 产品全系列目录，支持分类浏览、产品详情查看，适合户外家具商家在线展示与客户浏览。</p>
    <span class="card-tag">进入工具 <span class="arrow">&rarr;</span></span>
  </a>
</div>

<footer>
  &copy; 2026 Make10B &mdash; 持续更新中
</footer>
</div>

<script>
var PWD_HASH = '3155f45a389a2d46592a622c28f456df891d532a751a03ae4ecd7efa142e24e6';

function sha256(str) {
  function rotr(x,n){return(x>>>n)|(x<<(32-n))}
  function ch(x,y,z){return(x&y)^(~x&z)}
  function maj(x,y,z){return(x&y)^(x&z)^(y&z)}
  function bsig0(x){return rotr(x,2)^rotr(x,13)^rotr(x,22)}
  function bsig1(x){return rotr(x,6)^rotr(x,11)^rotr(x,25)}
  function ssig0(x){return rotr(x,7)^rotr(x,18)^(x>>>3)}
  function ssig1(x){return rotr(x,17)^rotr(x,19)^(x>>>10)}
  function toBytes(s){var b=[],i;for(i=0;i<s.length;i++)b.push(s.charCodeAt(i)&255);return b}
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var msg=toBytes(str);var ml=msg.length*8;msg.push(0x80);
  while((msg.length*8)%512!==448)msg.push(0);
  for(var i=7;i>=0;i--)msg.push((ml/Math.pow(2,i*8))>>>0&255);
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  for(var b=0;b<msg.length;b+=64){
    var W=new Array(64);var i,j,a,b2,c,d,e,f,g,h,T1,T2;
    for(i=0;i<16;i++)W[i]=(msg[b+i*4]<<24)|(msg[b+i*4+1]<<16)|(msg[b+i*4+2]<<8)|msg[b+i*4+3];
    for(i=16;i<64;i++)W[i]=(ssig1(W[i-2])+W[i-7]+ssig0(W[i-15])+W[i-16])>>>0;
    a=H[0];b2=H[1];c=H[2];d=H[3];e=H[4];f=H[5];g=H[6];h=H[7];
    for(i=0;i<64;i++){
      T1=(h+bsig1(e)+ch(e,f,g)+K[i]+W[i])>>>0;
      T2=(bsig0(a)+maj(a,b2,c))>>>0;
      h=g;g=f;f=e;e=(d+T1)>>>0;d=c;c=b2;b2=a;a=(T1+T2)>>>0;
    }
    H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b2)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+h)>>>0;
  }
  var hex='';for(i=0;i<8;i++)hex+=('0000000'+H[i].toString(16)).slice(-8);
  return hex;
}

if (sessionStorage.getItem('make10b_auth') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainContent').classList.add('visible');
}

function checkPwd() {
  var input = document.getElementById('pwdInput').value;
  if (sha256(input) === PWD_HASH) {
    sessionStorage.setItem('make10b_auth', '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').classList.add('visible');
  } else {
    document.getElementById('errorMsg').textContent = '密码错误，请重试';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPwd();
});
</script>

</body>
</html>
