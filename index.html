<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Make10B 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0b1120;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  text-align: center;
  padding: 80px 24px 48px;
}
.hero .icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3);
}
.hero h1 {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 16px;
  color: #64748b;
  margin-top: 12px;
}
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 24px;
  width: 100%;
  max-width: 900px;
  padding: 0 24px 80px;
}
.tool-card {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border: 1px solid #1e293b;
  border-radius: 16px;
  padding: 40px 32px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.tool-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}
.tool-card.card-temperature::before { background: linear-gradient(90deg, #f59e0b, #ef4444, #3b82f6); }
.tool-card.card-product::before { background: linear-gradient(90deg, #10b981, #06b6d4); }
.tool-card:hover {
  border-color: #334155;
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
}
.tool-card:hover.card-temperature { box-shadow: 0 16px 48px rgba(245, 158, 11, 0.15); }
.tool-card:hover.card-product { box-shadow: 0 16px 48px rgba(16, 185, 129, 0.15); }
.tool-card .card-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.card-temperature .card-icon { background: rgba(245, 158, 11, 0.15); }
.card-product .card-icon { background: rgba(16, 185, 129, 0.15); }
.tool-card h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.tool-card p {
  font-size: 14px;
  color: #94a3b8;
  line-height: 1.7;
}
.tool-card .card-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #64748b;
  margin-top: auto;
  transition: color 0.3s;
}
.card-temperature:hover .card-tag { color: #f59e0b; }
.card-product:hover .card-tag { color: #10b981; }
.card-tag .arrow {
  display: inline-block;
  transition: transform 0.3s;
}
.tool-card:hover .arrow { transform: translateX(4px); }
footer {
  margin-top: auto;
  padding: 24px;
  text-align: center;
  color: #475569;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="hero">
  <div class="icon">&#x1F6E0;</div>
  <h1>Make10B 工具箱</h1>
  <p class="subtitle">实用工具集，高效解决你的数据分析与展示需求</p>
</div>

<div class="tool-grid">
  <a href="temperature/index.html" class="tool-card card-temperature">
    <div class="card-icon">&#x1F321;</div>
    <h2>全球城市气温对比</h2>
    <p>2025-2026 全球城市气温对比分析报告，包含交互式地图、趋势图表与多城市数据对比，助你洞察全球气候格局。</p>
    <span class="card-tag">进入工具 <span class="arrow">→</span></span>
  </a>

  <a href="product-catalog/index.html" class="tool-card card-product">
    <div class="card-icon">&#x1F4E6;</div>
    <h2>产品目录展示</h2>
    <p>Purple Leaf 产品全系列目录，支持分类浏览、产品详情查看，适合户外家具商家在线展示与客户浏览。</p>
    <span class="card-tag">进入工具 <span class="arrow">→</span></span>
  </a>
</div>

<footer>
  &copy; 2026 Make10B &mdash; 持续更新中
</footer>

</body>
</html>
