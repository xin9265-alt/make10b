<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Leaf 3D Product Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh;display:flex}
a{color:inherit;text-decoration:none}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#161b22}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}

/* Left Panel */
.panel{width:320px;min-width:320px;background:#1a1a2e;display:flex;flex-direction:column;border-right:1px solid #2d2d5e;z-index:10;overflow:hidden}
.panel-header{padding:16px 20px;background:linear-gradient(135deg,#16213e,#1a1a2e);border-bottom:1px solid #2d2d5e;display:flex;align-items:center;gap:10px}
.panel-header h1{font-size:18px;font-weight:700;color:#e0e0ff;letter-spacing:0.5px}
.panel-header .logo{width:32px;height:32px;background:linear-gradient(135deg,#6c63ff,#48c6ef);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.panel-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px}

/* Section */
.section-title{font-size:12px;font-weight:600;text-transform:uppercase;color:#8b8ba7;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:block;width:3px;height:14px;background:linear-gradient(180deg,#6c63ff,#48c6ef);border-radius:2px}

/* Upload Zone */
.upload-zone{border:2px dashed #3d3d6e;border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .25s;background:#16213e40}
.upload-zone:hover,.upload-zone.drag-over{border-color:#6c63ff;background:#6c63ff15;transform:translateY(-1px);box-shadow:0 4px 20px #6c63ff20}
.upload-zone .upload-icon{font-size:32px;margin-bottom:8px;display:block;opacity:.7}
.upload-zone .upload-text{font-size:13px;color:#a0a0c0}
.upload-zone .upload-hint{font-size:11px;color:#6b6b8a;margin-top:6px}
.upload-zone input[type=file]{display:none}

/* Search */
.search-box{position:relative}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:1px solid #3d3d6e;border-radius:8px;font-size:13px;background:#0d0d20;color:#c9d1d9;transition:.2s;outline:none}
.search-box input:focus{border-color:#6c63ff;box-shadow:0 0 0 3px #6c63ff20}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6b6b8a;font-size:14px}

/* Product List */
.product-scroll{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-top:8px;border-radius:8px}
.product-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.2s;background:#16213e30;border:1px solid transparent}
.product-item:hover{background:#16213e80;border-color:#3d3d6e;transform:translateX(2px)}
.product-item img{width:44px;height:44px;border-radius:6px;object-fit:cover;background:#0d0d20;flex-shrink:0}
.product-item .prod-info{flex:1;min-width:0}
.product-item .prod-name{font-size:12px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.product-item .prod-sku{font-size:10px;color:#6b6b8a;margin-top:2px}
.product-item .add-btn{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#48c6ef);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:.2s;display:flex;align-items:center;justify-content:center;line-height:1}
.product-item .add-btn:hover{transform:scale(1.1);box-shadow:0 0 12px #6c63ff60}
.no-results{text-align:center;padding:20px;color:#6b6b8a;font-size:12px}

/* Scene Model List */
.model-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.model-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:#16213e30;border:1px solid #2d2d5e;transition:.2s;cursor:pointer}
.model-item:hover{background:#16213e80}
.model-item.selected{border-color:#6c63ff;background:#6c63ff15;box-shadow:0 0 12px #6c63ff20}
.model-item .model-thumb{width:48px;height:48px;border-radius:6px;background:#0d0d20;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#6b6b8a;overflow:hidden}
.model-item .model-thumb img{width:100%;height:100%;object-fit:cover}
.model-info{flex:1;min-width:0}
.model-name{font-size:13px;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.model-source{font-size:10px;color:#6b6b8a;margin-top:2px}
.model-actions{display:flex;gap:4px}
.model-actions button{width:28px;height:28px;border-radius:6px;border:1px solid #3d3d6e;background:transparent;color:#8b8ba7;cursor:pointer;font-size:12px;transition:.2s;display:flex;align-items:center;justify-content:center}
.model-actions button:hover{background:#e74c3c20;border-color:#e74c3c;color:#e74c3c}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#6c63ff,#48c6ef);color:#fff}
.btn-primary:hover{box-shadow:0 4px 16px #6c63ff40;transform:translateY(-1px)}
.btn-danger{background:#e74c3c20;color:#e74c3c;border:1px solid #e74c3c40}
.btn-danger:hover{background:#e74c3c30}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}

/* 3D Canvas Container */
.canvas-container{flex:1;position:relative;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0d1117 70%)}
.canvas-container canvas{display:block}
#three-canvas{width:100%;height:100%}

/* Top Toolbar */
.toolbar{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:8px 12px;background:#1a1a2eee;border:1px solid #2d2d5e;border-radius:12px;z-index:20;backdrop-filter:blur(10px)}
.toolbar button{width:36px;height:36px;border-radius:8px;border:1px solid #3d3d6e;background:transparent;color:#8b8ba7;cursor:pointer;font-size:14px;transition:.2s;display:flex;align-items:center;justify-content:center;position:relative}
.toolbar button:hover{background:#16213e80;color:#c9d1d9;border-color:#6c63ff}
.toolbar button.active{background:#6c63ff20;border-color:#6c63ff;color:#6c63ff}
.toolbar .divider{width:1px;background:#3d3d6e;margin:0 4px}

/* Tooltip */
[data-tooltip]{position:relative}
[data-tooltip]::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#c9d1d9;padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;border:1px solid #3d3d6e;z-index:30}
[data-tooltip]:hover::after{opacity:1}

/* Status bar */
.status-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#1a1a2eee;padding:6px 14px;border-radius:20px;font-size:11px;color:#6b6b8a;border:1px solid #2d2d5e;pointer-events:none;z-index:10}

/* Drop Zone Hint */
.drop-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#6c63ff15;z-index:15;pointer-events:none;opacity:0;transition:.2s}
.drop-hint.show{opacity:1}
.drop-hint-inner{background:#1a1a2eee;padding:24px 40px;border-radius:16px;border:2px dashed #6c63ff;color:#c9d1d9;font-size:16px;font-weight:600;text-align:center}

/* Rename Modal */
.modal-overlay{position:fixed;inset:0;background:#00000080;z-index:100;display:flex;align-items:center;justify-content:center;display:none}
.modal-overlay.show{display:flex}
.modal{background:#1a1a2e;border:1px solid #2d2d5e;border-radius:16px;padding:24px;min-width:320px;box-shadow:0 20px 60px #00000060}
.modal h3{font-size:15px;margin-bottom:16px;color:#c9d1d9}
.modal input{width:100%;padding:10px 14px;border:1px solid #3d3d6e;border-radius:8px;font-size:14px;background:#0d0d20;color:#c9d1d9;outline:none;margin-bottom:16px}
.modal input:focus{border-color:#6c63ff}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

/* Responsive */
@media(max-width:768px){
.panel{width:260px;min-width:260px}
.toolbar{gap:4px;padding:6px 8px}
.toolbar button{width:30px;height:30px;font-size:12px}
}

/* Loading indicator */
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #6c63ff40;border-top-color:#6c63ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Left Panel -->
<div class="panel" id="panel">
<div class="panel-header">
<div class="logo">3D</div>
<h1>Product Studio</h1>
</div>
<div class="panel-body">

<!-- Upload Section -->
<div class="section-title">模型上传</div>
<div class="upload-zone" id="uploadZone">
<span class="upload-icon">&#128194;</span>
<span class="upload-text">拖拽 .glb 文件到此处</span>
<span class="upload-hint">或点击选择文件</span>
<input type="file" id="fileInput" accept=".glb" multiple>
</div>

<!-- SKU Search Section -->
<div class="section-title">产品选择</div>
<div class="search-box">
<span class="search-icon">&#128269;</span>
<input type="text" id="skuSearch" placeholder="搜索 SKU 或产品名称...">
</div>
<div class="product-scroll" id="productList"></div>

<!-- Scene Models Section -->
<div class="section-title" style="margin-top:4px">场景模型 (<span id="modelCount">0</span>)</div>
<div class="model-list" id="modelList">
<div class="no-results">尚未添加模型<br>上传 GLB 或从产品列表添加</div>
</div>
<button class="btn btn-danger btn-full" id="clearSceneBtn">清空场景</button>

</div>
</div>

<!-- 3D Canvas -->
<div class="canvas-container" id="canvasContainer">
<canvas id="three-canvas"></canvas>

<!-- Top Toolbar -->
<div class="toolbar" id="toolbar">
<button data-tooltip="重置视角" id="btnReset" title="重置视角">&#8634;</button>
<div class="divider"></div>
<button data-tooltip="俯视图" id="btnTop" title="俯视图">&#9650;</button>
<button data-tooltip="前视图" id="btnFront" title="前视图">&#9638;</button>
<button data-tooltip="侧视图" id="btnSide" title="侧视图">&#9637;</button>
<div class="divider"></div>
<button data-tooltip="显示/隐藏网格" id="btnGrid" title="网格" class="active">#</button>
<div class="divider"></div>
<button data-tooltip="截图导出" id="btnScreenshot" title="截图">&#128247;</button>
</div>

<!-- Drop Hint -->
<div class="drop-hint" id="dropHint"><div class="drop-hint-inner">释放以加载模型</div></div>

<!-- Status -->
<div class="status-bar" id="statusBar">右键旋转 | 滚轮缩放 | 中键平移 | 左键拖拽模型</div>
</div>

<!-- Rename Modal -->
<div class="modal-overlay" id="renameModal">
<div class="modal">
<h3>重命名模型</h3>
<input type="text" id="renameInput" placeholder="输入新名称">
<div class="modal-actions">
<button class="btn btn-danger btn-sm" id="renameCancel">取消</button>
<button class="btn btn-primary btn-sm" id="renameConfirm">确认</button>
</div>
</div>
</div>

</script>

T", "title": "PURPLE LEAF Griffin White Patio Conversation Set Modular Sectional Sofa Components", "image": "https://cdn.shopify.com/s/files/1/0025/3172/1251/files/zy01-glfsfcj-wt.jpg?v=1774434206"}, {"sku": "ZY01-GLFSFJT-WT", "title": "PURPLE LEAF Griffin White Patio Conversation Set Modular Sectional Sofa Components", "image": "https://cdn.shopify.com/s/files/1/0025/3172/1251/files/zy01-glfsfjt-wt.jpg?v=1774064449"}, {"sku": "ZY01GLFSF22-4-W2Z2JC2-WT", "title": "PURPLE LEAF Griffin L-shaped Patio Conversation Set White with Cushion Pillows Ottoman and Premium Leather for Patio Balcony", "image": "https://cdn.shopify.com/s/files/1/0025/3172/1251/files/zy01glfsf22-4-w2z2jc2-wt.jpg?v=1774431682"}];

// ============ State ============
const state = {
models: [],           // {id, name, sku, image, file, mesh, bbox, source:'upload'|'product'}
selectedId: null,
gridVisible: true,
nextId: 1
};

// ============ DOM ============
const canvas = document.getElementById('three-canvas');
const canvasContainer = document.getElementById('canvasContainer');
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const productList = document.getElementById('productList');
const modelList = document.getElementById('modelList');
const modelCount = document.getElementById('modelCount');
const skuSearch = document.getElementById('skuSearch');
const clearSceneBtn = document.getElementById('clearSceneBtn');
const statusBar = document.getElementById('statusBar');
const dropHint = document.getElementById('dropHint');
const renameModal = document.getElementById('renameModal');
const renameInput = document.getElementById('renameInput');
let renameTargetId = null;

// ============ Three.js Setup ============
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.Fog('#1a1a2e', 30, 80);

const camera = new THREE.PerspectiveCamera(50, 2, 0.1, 200);
camera.position.set(12, 8, 12);
camera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight('#b8c8ff', 1.2);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight('#d0e0ff', '#3a3040', 0.8);
scene.add(hemiLight);

const sunLight = new THREE.DirectionalLight('#ffffff', 4.5);
sunLight.position.set(15, 25, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
sunLight.shadow.bias = -0.0001;
scene.add(sunLight);

// Floor
const floorGeom = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.MeshStandardMaterial({color:'#4a4035', roughness:0.55, metalness:0.05});
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
floor.name = 'floor';
scene.add(floor);

// Grid
const gridHelper = new THREE.PolarGridHelper(20, 64, 48, 256, '#888888', '#555555');
gridHelper.position.y = 0.005;
gridHelper.name = 'grid';
scene.add(gridHelper);

// Center cross
const crossMat = new THREE.MeshBasicMaterial({color:'#6c63ff', transparent:true, opacity:0.3, depthTest:false});
const crossH = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.08), crossMat);
crossH.rotation.x = -Math.PI/2; crossH.position.y = 0.008; scene.add(crossH);
const crossV = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 0.8), crossMat);
crossV.rotation.x = -Math.PI/2; crossV.position.y = 0.008; scene.add(crossV);

// Controls
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.target.set(0, 0.5, 0);
orbitControls.minDistance = 3;
orbitControls.maxDistance = 40;
orbitControls.maxPolarAngle = Math.PI / 2.1;
orbitControls.mouseButtons = {LEFT:null, MIDDLE:THREE.MOUSE.PAN, RIGHT:THREE.MOUSE.ROTATE};
orbitControls.touches = {ONE:THREE.TOUCH.ROTATE, TWO:THREE.TOUCH.DOLLY_PAN};
orbitControls.update();

// Drag Controls
const dragControls = new DragControls([], camera, renderer.domElement);
dragControls.enabled = true;

// ============ Selection Highlight ============
const highlightMat = new THREE.MeshBasicMaterial({color:'#6c63ff', side:THREE.BackSide, transparent:true, opacity:0.15});
const outlineMat = new THREE.MeshBasicMaterial({color:'#6c63ff', side:THREE.FrontSide, wireframe:true, transparent:true, opacity:0.6});
let highlightGroup = null;

function clearHighlight() {
if (highlightGroup) {scene.remove(highlightGroup);highlightGroup=null;}
state.selectedId = null;
document.querySelectorAll('.model-item').forEach(el=>el.classList.remove('selected'));
}

function highlightModel(modelId) {
clearHighlight();
const model = state.models.find(m=>m.id===modelId);
if (!model||!model.mesh) return;
state.selectedId = modelId;
const box = new THREE.Box3().setFromObject(model.mesh);
const size = box.getSize(new THREE.Vector3());
const center = box.getCenter(new THREE.Vector3());
highlightGroup = new THREE.Group();
const hlGeom = new THREE.BoxGeometry(size.x+0.15, size.y+0.1, size.z+0.15);
const hlMesh = new THREE.Mesh(hlGeom, highlightMat);
hlMesh.position.copy(center);
highlightGroup.add(hlMesh);
const olMesh = new THREE.Mesh(hlGeom, outlineMat);
olMesh.position.copy(center);
highlightGroup.add(olMesh);
scene.add(highlightGroup);
// Update list
document.querySelectorAll('.model-item').forEach(el=>{
if (parseInt(el.dataset.id)===modelId) el.classList.add('selected');
});
}

// ============ Raycaster for click select ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;

dragControls.addEventListener('dragstart', ()=>{isDragging=true;});
dragControls.addEventListener('dragend', ()=>{setTimeout(()=>isDragging=false, 50);});

canvas.addEventListener('click', (e)=>{
if (isDragging) return;
const rect = canvas.getBoundingClientRect();
mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
raycaster.setFromCamera(mouse, camera);
const meshes = state.models.filter(m=>m.mesh).map(m=>m.mesh);
const intersects = raycaster.intersectObjects(meshes, true);
if (intersects.length>0) {
let obj = intersects[0].object;
while (obj) {
const model = state.models.find(m=>m.mesh===obj);
if (model) {highlightModel(model.id);return;}
obj = obj.parent;
}
}
clearHighlight();
});

// Double click to rotate 90
canvas.addEventListener('dblclick', (e)=>{
const rect = canvas.getBoundingClientRect();
mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
raycaster.setFromCamera(mouse, camera);
const meshes = state.models.filter(m=>m.mesh).map(m=>m.mesh);
const intersects = raycaster.intersectObjects(meshes, true);
if (intersects.length>0) {
let obj = intersects[0].object;
while (obj) {
const model = state.models.find(m=>m.mesh===obj);
if (model) {
model.mesh.rotation.y += Math.PI/2;
clearHighlight();
highlightModel(model.id);
return;
}
obj = obj.parent;
}
}
});

// Delete key
window.addEventListener('keydown', (e)=>{
if (e.key==='Delete'&&state.selectedId!==null) {
removeModel(state.selectedId);
}
});

// ============ DragControls: constrain Y axis ============
dragControls.addEventListener('drag', (event)=>{
const obj = event.object;
// Keep Y at floor level
if (obj.userData && obj.userData.groundY !== undefined) {
obj.position.y = obj.userData.groundY;
}
});

// ============ GLTF Loader ============
const loader = new GLTFLoader();

function loadGLB(file, modelData) {
const url = URL.createObjectURL(file);
loader.load(url, (gltf)=>{
URL.revokeObjectURL(url);
const mesh = gltf.scene;
// Auto-scale
const box = new THREE.Box3().setFromObject(mesh);
const size = box.getSize(new THREE.Vector3());
const maxDim = Math.max(size.x, size.y, size.z);
const targetSize = 2.0;
if (maxDim>0) {
const scale = targetSize/maxDim;
mesh.scale.setScalar(scale);
}
// Center on ground
box.setFromObject(mesh);
const center = box.getCenter(new THREE.Vector3());
const minY = box.min.y;
mesh.position.set(-center.x, -minY, -center.z);
mesh.traverse((child)=>{
if (child.isMesh) {
child.castShadow = true;
child.receiveShadow = true;
if (child.material && !child.material.emissive) {
child.material.roughness = Math.min(child.material.roughness||1, 0.8);
child.material.metalness = child.material.metalness||0.05;
}
}
});
mesh.userData.groundY = -minY;
scene.add(mesh);
modelData.mesh = mesh;
modelData.bbox = box;
// Update drag controls
updateDragObjects();
updateModelList();
statusBar.textContent = `已加载: ${modelData.name}`;
}, (progress)=>{
const pct = progress.total>0?Math.round(progress.loaded/progress.total*100):0;
statusBar.textContent = `加载中... ${pct}%`;
}, (err)=>{
console.error('GLB load error:', err);
statusBar.textContent = '模型加载失败';
alert('模型加载失败，请确认文件格式为 .glb');
removeModelSilent(modelData.id);
});
}

function updateDragObjects() {
const meshes = state.models.filter(m=>m.mesh).map(m=>m.mesh);
dragControls.dispose();
dragControls.object = meshes;
dragControls.activate();
// Find floor for DragControls
dragControls._objects = meshes;
}

// ============ Model Management ============
function addModel(name, source, image, file, sku) {
const id = state.nextId++;
const modelData = {id, name, source, image, sku:sku||'', file, mesh:null, bbox:null};
state.models.push(modelData);
if (file) {
loadGLB(file, modelData);
}
updateModelList();
}

function removeModel(id) {
const idx = state.models.findIndex(m=>m.id===id);
if (idx===-1) return;
const model = state.models[idx];
if (model.mesh) {
scene.remove(model.mesh);
// Dispose
model.mesh.traverse((child)=>{
if (child.geometry) child.geometry.dispose();
if (child.material) {
if (Array.isArray(child.material)) child.material.forEach(m=>m.dispose());
else child.material.dispose();
}
});
}
if (state.selectedId===id) clearHighlight();
state.models.splice(idx,1);
updateDragObjects();
updateModelList();
}

function removeModelSilent(id) {
const idx = state.models.findIndex(m=>m.id===id);
if (idx===-1) return;
state.models.splice(idx,1);
updateDragObjects();
updateModelList();
}

function clearScene() {
if (state.models.length===0) return;
if (!confirm(`确定要清空场景中所有 ${state.models.length} 个模型吗？`)) return;
[...state.models].forEach(m=>removeModel(m.id));
}

function updateModelList() {
modelCount.textContent = state.models.length;
if (state.models.length===0) {
modelList.innerHTML = '<div class="no-results">尚未添加模型<br>上传 GLB 或从产品列表添加</div>';
} else {
modelList.innerHTML = state.models.map(m=>`
<div class="model-item${state.selectedId===m.id?' selected':''}" data-id="${m.id}" onclick="window._selectModel(${m.id})">
<div class="model-thumb">${m.image?`<img src="${m.image}" onerror="this.style.display='none';this.parentElement.innerHTML='&#128230;'">`:'&#128230;'}</div>
<div class="model-info">
<div class="model-name">${m.name}</div>
<div class="model-source">${m.source==='upload'?'用户上传':(m.sku?'SKU: '+m.sku:'产品')}</div>
</div>
<div class="model-actions">
<button title="重命名" onclick="event.stopPropagation();window._renameModel(${m.id})">&#9998;</button>
<button title="删除" onclick="event.stopPropagation();window._removeModel(${m.id})">&#10005;</button>
</div>
</div>
`).join('');
}
}

// Global functions for onclick
window._selectModel = (id)=>highlightModel(id);
window._removeModel = (id)=>removeModel(id);
window._renameModel = (id)=>{
renameTargetId = id;
const model = state.models.find(m=>m.id===id);
if (model) renameInput.value = model.name;
renameModal.classList.add('show');
renameInput.focus();
renameInput.select();
};

// ============ Product List ============
let filteredProducts = PRODUCTS;

function renderProductList(products) {
if (products.length===0) {
productList.innerHTML = '<div class="no-results">无匹配产品</div>';
return;
}
const show = products.slice(0, 50);
productList.innerHTML = show.map(p=>`
<div class="product-item" onclick="window._addProduct('${p.sku}')">
<img src="${p.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22><rect fill=%22%230d0d20%22 width=%2244%22 height=%2244%22/><text x=%2222%22 y=%2227%22 text-anchor=%22middle%22 fill=%22%236b6b8a%22 font-size=%2216%22>?</text></svg>'">
<div class="prod-info">
<div class="prod-name" title="${p.title}">${p.title}</div>
<div class="prod-sku">${p.sku}</div>
</div>
<button class="add-btn" title="添加到场景" onclick="event.stopPropagation();window._addProduct('${p.sku}')">+</button>
</div>
`).join('');
if (products.length>50) {
productList.innerHTML += `<div class="no-results">显示前50条，共${products.length}条匹配结果</div>`;
}
}

window._addProduct = (sku)=>{
const p = PRODUCTS.find(x=>x.sku===sku);
if (!p) return;
addModel(p.title, 'product', p.image, null, p.sku);
};

skuSearch.addEventListener('input', ()=>{
const q = skuSearch.value.toLowerCase().trim();
if (!q) {filteredProducts=PRODUCTS;}
else {filteredProducts=PRODUCTS.filter(p=>p.sku.toLowerCase().includes(q)||p.title.toLowerCase().includes(q));}
renderProductList(filteredProducts);
});

// ============ Upload ============
uploadZone.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', handleFiles);

uploadZone.addEventListener('dragover', (e)=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e)=>{
e.preventDefault();
uploadZone.classList.remove('drag-over');
handleFiles({target:{files:e.dataTransfer.files}});
});

// Canvas drop zone
canvasContainer.addEventListener('dragover', (e)=>{e.preventDefault();dropHint.classList.add('show');});
canvasContainer.addEventListener('dragleave', (e)=>{
if (!canvasContainer.contains(e.relatedTarget)) dropHint.classList.remove('show');
});
canvasContainer.addEventListener('drop', (e)=>{
e.preventDefault();
dropHint.classList.remove('show');
handleFiles({target:{files:e.dataTransfer.files}});
});

function handleFiles(e) {
const files = Array.from(e.target.files||[]);
files.forEach(file=>{
if (!file.name.toLowerCase().endsWith('.glb')) {
alert(`文件 "${file.name}" 不是 .glb 格式`);
return;
}
const name = file.name.replace(/\.glb$/i,'');
addModel(name, 'upload', null, file, null);
});
fileInput.value = '';
}

// ============ Clear Scene ============
clearSceneBtn.addEventListener('click', clearScene);

// ============ Rename Modal ============
document.getElementById('renameCancel').addEventListener('click', ()=>{
renameModal.classList.remove('show');
renameTargetId = null;
});
document.getElementById('renameConfirm').addEventListener('click', ()=>{
if (renameTargetId===null) return;
const model = state.models.find(m=>m.id===renameTargetId);
if (model) {
model.name = renameInput.value.trim()||model.name;
updateModelList();
}
renameModal.classList.remove('show');
renameTargetId = null;
});
renameInput.addEventListener('keydown', (e)=>{
if (e.key==='Enter') document.getElementById('renameConfirm').click();
if (e.key==='Escape') document.getElementById('renameCancel').click();
});

// ============ Toolbar ============
document.getElementById('btnReset').addEventListener('click', ()=>{
camera.position.set(12, 8, 12);
orbitControls.target.set(0, 0.5, 0);
orbitControls.update();
});

document.getElementById('btnTop').addEventListener('click', ()=>{
camera.position.set(0, 12, 0.1);
orbitControls.target.set(0, 0, 0);
orbitControls.update();
});

document.getElementById('btnFront').addEventListener('click', ()=>{
camera.position.set(0, 2, 12);
orbitControls.target.set(0, 1, 0);
orbitControls.update();
});

document.getElementById('btnSide').addEventListener('click', ()=>{
camera.position.set(12, 2, 0);
orbitControls.target.set(0, 1, 0);
orbitControls.update();
});

document.getElementById('btnGrid').addEventListener('click', function() {
state.gridVisible = !state.gridVisible;
gridHelper.visible = state.gridVisible;
this.classList.toggle('active', state.gridVisible);
});

document.getElementById('btnScreenshot').addEventListener('click', ()=>{
renderer.render(scene, camera);
const dataURL = renderer.domElement.toDataURL('image/png');
const link = document.createElement('a');
const dt = new Date();
const ts = `${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}_${String(dt.getHours()).padStart(2,'0')}${String(dt.getMinutes()).padStart(2,'0')}${String(dt.getSeconds()).padStart(2,'0')}`;
link.download = `product_studio_${ts}.png`;
link.href = dataURL;
link.click();
statusBar.textContent = '截图已保存';
setTimeout(()=>statusBar.textContent='右键旋转 | 滚轮缩放 | 中键平移 | 左键拖拽模型', 2000);
});

// ============ Resize ============
function resize() {
const w = canvasContainer.clientWidth;
const h = canvasContainer.clientHeight;
renderer.setSize(w, h, false);
camera.aspect = w/Math.max(h,1);
camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ============ Render Loop ============
function animate() {
requestAnimationFrame(animate);
orbitControls.update();
renderer.render(scene, camera);
}
animate();

// ============ Init ============
renderProductList(PRODUCTS);
statusBar.textContent = '右键旋转 | 滚轮缩放 | 中键平移 | 左键拖拽模型';
</script>
</body>
</html>
