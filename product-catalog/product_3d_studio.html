<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Leaf 模块化家具配置器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh;display:flex}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#161b22}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

/* Left Panel */
.panel{width:340px;min-width:340px;background:#111827;display:flex;flex-direction:column;border-right:1px solid #1f2937;z-index:10;overflow:hidden}
.panel-header{padding:14px 18px;background:#0f172a;border-bottom:1px solid #1f2937;display:flex;align-items:center;gap:10px}
.panel-header .logo{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.panel-header .logo svg{width:18px;height:18px;fill:#fff}
.panel-header h1{font-size:16px;font-weight:700;color:#f1f5f9}
.panel-header .back-link{font-size:12px;color:#64748b;margin-left:auto;transition:color .2s}
.panel-header .back-link:hover{color:#94a3b8}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px}

.section-title{font-size:11px;font-weight:600;text-transform:uppercase;color:#64748b;letter-spacing:1.5px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:12px;background:#2563eb;border-radius:2px}

/* Module Cards */
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.module-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.module-card:hover{background:#1e3a5f;border-color:#2563eb;transform:translateY(-1px)}
.module-card .mod-icon{font-size:28px;line-height:1}
.module-card .mod-name{font-size:12px;font-weight:600;color:#e2e8f0}
.module-card .mod-price{font-size:11px;color:#64748b}
.module-card .mod-add{width:24px;height:24px;border-radius:50%;background:#2563eb;border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:2px}
.module-card .mod-add:hover{background:#3b82f6;box-shadow:0 0 10px rgba(37,99,235,.4)}

/* Presets */
.preset-list{display:flex;flex-direction:column;gap:6px}
.preset-item{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.preset-item:hover{background:#1e3a5f;border-color:#2563eb}
.preset-item .preset-info{display:flex;flex-direction:column;gap:2px}
.preset-item .preset-name{font-size:14px;font-weight:600;color:#e2e8f0}
.preset-item .preset-desc{font-size:11px;color:#64748b}
.preset-item .preset-load{background:#2563eb;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s;font-weight:500}
.preset-item .preset-load:hover{background:#3b82f6}

/* Color Swatches */
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 10px currentColor}

/* Added modules list in panel */
.added-list{display:flex;flex-direction:column;gap:4px}
.added-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#1e293b;border:1px solid #334155;border-radius:8px;font-size:12px;transition:.2s}
.added-item .item-icon{font-size:18px;flex-shrink:0}
.added-item .item-name{flex:1;color:#e2e8f0;font-weight:500}
.added-item .item-price{color:#64748b;font-size:11px}
.added-item .item-del{width:22px;height:22px;border-radius:6px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.added-item .item-del:hover{background:#7f1d1d;border-color:#dc2626;color:#fca5a5}

/* Price Summary */
.price-summary{border-top:1px solid #1f2937;padding-top:12px;display:flex;justify-content:space-between;align-items:center}
.price-summary .total-label{font-size:13px;color:#64748b}
.price-summary .total-price{font-size:22px;font-weight:800;color:#f1f5f9}

/* Panel Footer */
.panel-footer{padding:14px 16px;border-top:1px solid #1f2937;display:flex;gap:8px}
.panel-footer button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-reset{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.btn-reset:hover{background:#dc262620;color:#fca5a5;border-color:#dc2626}
.btn-checkout{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.btn-checkout:hover{opacity:.9;box-shadow:0 4px 16px rgba(37,99,235,.3)}

/* 3D Canvas */
.canvas-container{flex:1;position:relative;background:radial-gradient(ellipse at center,#1e293b 0%,#0f172a 70%)}
.canvas-container canvas{display:block}

/* Top Toolbar */
.toolbar{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px 10px;background:#111827ee;border:1px solid #1f2937;border-radius:10px;z-index:20;backdrop-filter:blur(10px)}
.toolbar button{width:34px;height:34px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;transition:.2s;display:flex;align-items:center;justify-content:center}
.toolbar button:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.toolbar .divider{width:1px;background:#334155;margin:0 3px}

/* Module tags bar (below toolbar) */
.module-tags{position:absolute;top:68px;left:50%;transform:translateX(-50%);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:80%;z-index:20}
.module-tag{background:#1e293bee;border:1px solid #334155;border-radius:20px;padding:5px 14px;font-size:12px;color:#cbd5e1;cursor:pointer;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.module-tag:hover{background:#1e3a5fee;border-color:#2563eb}
.module-tag.selected{background:#2563eb30;border-color:#2563eb;color:#60a5fa}
.module-tag .tag-del{width:16px;height:16px;border-radius:50%;background:#ef444430;color:#fca5a5;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:2px}
.module-tag .tag-del:hover{background:#dc2626;color:#fff}

/* Floor grid hint */
.floor-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#475569;font-size:11px;z-index:10;pointer-events:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:#00000080;z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:24px;min-width:340px;box-shadow:0 20px 60px #00000060}
.modal h3{font-size:16px;margin-bottom:16px;color:#f1f5f9}
.modal p{font-size:13px;color:#94a3b8;margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.modal-btn-cancel{background:#1e293b;color:#94a3b8}
.modal-btn-confirm{background:#2563eb;color:#fff}

@media(max-width:900px){
.panel{width:280px;min-width:280px}
.module-grid{grid-template-columns:1fr}
}
</style>
</head>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ Data ============
const MODULES = {
  'left-arm':  { name:'左扶手模块', price:1170, icon:'🪑', w:1.0, d:1.0, h:0.85, arm:'left' },
  'right-arm': { name:'右扶手模块', price:1170, icon:'🪑', w:1.0, d:1.0, h:0.85, arm:'right' },
  'armless':   { name:'无扶手模块', price:950,  icon:'🛋', w:1.0, d:1.0, h:0.85, arm:'none' },
  'corner':    { name:'转角模块',   price:1280, icon:'🔲', w:1.0, d:1.0, h:0.85, arm:'corner' },
  'table':     { name:'茶几模块',   price:700,  icon:'☕', w:0.6, d:0.6, h:0.45, arm:'table' },
  'ottoman':   { name:'脚踏模块',   price:650,  icon:'🧶', w:0.7, d:0.7, h:0.45, arm:'none' }
};

const PRESETS = {
  '3seater':      { name:'三人沙发', modules:['left-arm','armless','right-arm'] },
  'lshape':       { name:'L型转角组合', modules:['left-arm','corner','armless','right-arm'] },
  'ushape':       { name:'U型大组合', modules:['left-arm','armless','corner','armless','right-arm'] },
  'lshape-table': { name:'带茶几L型', modules:['left-arm','corner','table','right-arm'] }
};

// ============ State ============
let addedModules = [];
let currentColor = '#e8ddd0';
let sceneObjects = [];

// ============ Scene Setup ============
const container = document.getElementById('canvasContainer');
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 2, 0.1, 50);
camera.position.set(8, 5, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI / 2.2;
controls.update();

// Lighting
const ambient = new THREE.AmbientLight('#ffffff', 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight('#ffffff', 1.8);
sun.position.set(8, 12, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -2;
sun.shadow.bias = -0.0001;
scene.add(sun);

const fill = new THREE.DirectionalLight('#b3cde0', 0.4);
fill.position.set(-4, 2, -3);
scene.add(fill);

// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color:'#1a1a2e', roughness:0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid
const grid = new THREE.GridHelper(12, 24, '#334155', '#1e293b');
grid.position.y = 0.002;
scene.add(grid);

// ============ Module 3D Builder ============
function getModuleColor() { return new THREE.Color(currentColor); }
function getFrameColor() { return new THREE.Color('#6B5B4F'); }
function getLegColor() { return new THREE.Color('#3d3025'); }
function cushionMat(baseColor) { return new THREE.MeshStandardMaterial({ color:baseColor, roughness:0.75 }); }
function frameMat() { return new THREE.MeshStandardMaterial({ color:getFrameColor(), roughness:0.5, metalness:0.05 }); }
function legMat() { return new THREE.MeshStandardMaterial({ color:getLegColor(), roughness:0.4 }); }

function createRoundedBox(w, h, d, radius, material) {
  // Use beveled box for smoother look
  const geo = new THREE.BoxGeometry(w, h, d, 2, 2, 2);
  // Slightly round by modifying vertices (simple approach: use RoundedBoxGeometry style)
  const positions = geo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);
    const hw = w / 2, hh = h / 2, hd = d / 2;
    const dx = Math.max(0, Math.abs(x) - hw + radius);
    const dy = Math.max(0, Math.abs(y) - hh + radius);
    const dz = Math.max(0, Math.abs(z) - hd + radius);
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist > 0 && dist < radius) {
      const factor = (radius - dist) / radius * 0.3;
      positions.setX(i, x - Math.sign(x) * dx * factor);
      positions.setY(i, y - Math.sign(y) * dy * factor);
      positions.setZ(i, z - Math.sign(z) * dz * factor);
    }
  }
  geo.computeVertexNormals();
  return new THREE.Mesh(geo, material);
}

function createModule3D(type) {
  const group = new THREE.Group();
  const cfg = MODULES[type];
  const w = cfg.w;
  const d = cfg.d;
  const h = cfg.h;
  const fc = getModuleColor();
  const fcLight = fc.clone().multiplyScalar(1.08);

  if (type === 'table') {
    // Table top with chamfered edge
    const topGeo = new THREE.CylinderGeometry(w/2 - 0.02, w/2, 0.06, 32);
    const top = new THREE.Mesh(topGeo, frameMat());
    top.position.y = h - 0.03;
    top.castShadow = true; top.receiveShadow = true;
    group.add(top);

    // Cross legs
    const legGeo = new THREE.CylinderGeometry(0.04, 0.05, h - 0.06, 8);
    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 2) {
      const leg = new THREE.Mesh(legGeo, legMat());
      leg.position.set(Math.cos(angle) * (w/2 - 0.12), (h - 0.06) / 2, Math.sin(angle) * (w/2 - 0.12));
      leg.castShadow = true;
      group.add(leg);
    }
    return group;
  }

  if (type === 'ottoman') {
    // Thick cushion
    const cGeo = new THREE.BoxGeometry(w - 0.04, 0.22, d - 0.04, 4, 4, 4);
    const cushion = new THREE.Mesh(cGeo, cushionMat(fcLight));
    cushion.position.y = h - 0.11;
    cushion.castShadow = true; cushion.receiveShadow = true;
    group.add(cushion);

    // Base
    const bGeo = new THREE.BoxGeometry(w - 0.02, h - 0.24, d - 0.02);
    const base = new THREE.Mesh(bGeo, frameMat());
    base.position.y = (h - 0.24) / 2;
    base.castShadow = true; base.receiveShadow = true;
    group.add(base);

    // Legs
    for (let lx = -1; lx <= 1; lx += 2) {
      for (let lz = -1; lz <= 1; lz += 2) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.12, 8), legMat());
        leg.position.set(lx * (w/2 - 0.1), 0.06, lz * (d/2 - 0.1));
        leg.castShadow = true;
        group.add(leg);
      }
    }
    return group;
  }

  // === STANDARD SOFA MODULE ===
  const hasLeftArm = (cfg.arm === 'left');
  const hasRightArm = (cfg.arm === 'right');
  const isCorner = (cfg.arm === 'corner');

  // Base platform - extends to exact edges
  const baseH = 0.14;
  const baseGeo = new THREE.BoxGeometry(w, baseH, d);
  const base = new THREE.Mesh(baseGeo, frameMat());
  base.position.y = baseH / 2;
  base.castShadow = true; base.receiveShadow = true;
  group.add(base);

  // Seat cushion - split into sections for realism
  const seatH = 0.14;
  const seatY = baseH + seatH / 2 + 0.01;
  const seatInset = 0.03;

  if (isCorner) {
    // Corner seat is square
    const seatGeo = new THREE.BoxGeometry(w - seatInset*2, seatH, d - seatInset*2, 4, 2, 4);
    const seat = new THREE.Mesh(seatGeo, cushionMat(fcLight));
    seat.position.y = seatY;
    seat.castShadow = true; seat.receiveShadow = true;
    group.add(seat);
  } else {
    // Split seat into two cushions
    const halfW = (w - seatInset*2) / 2 - 0.02;
    for (let s = 0; s < 2; s++) {
      const sx = (s - 0.5) * (halfW + 0.02);
      const seatGeo = new THREE.BoxGeometry(halfW, seatH, d - seatInset*2, 3, 2, 3);
      const seat = new THREE.Mesh(seatGeo, cushionMat(fcLight));
      seat.position.set(sx, seatY, 0);
      seat.castShadow = true; seat.receiveShadow = true;
      group.add(seat);
    }
  }

  // Back rest
  const backH = 0.38;
  const backD = 0.14;
  const backY = baseH + seatH + backH / 2;
  const backZ = -d/2 + backD/2 + 0.02;

  if (isCorner) {
    // Corner has back on two sides
    const backGeo = new THREE.BoxGeometry(w - seatInset*2, backH, backD, 4, 2, 1);
    const back1 = new THREE.Mesh(backGeo, cushionMat(fc));
    back1.position.set(0, backY, backZ);
    back1.castShadow = true;
    group.add(back1);

    const back2Geo = new THREE.BoxGeometry(backD, backH, d - seatInset*2, 1, 2, 4);
    const back2 = new THREE.Mesh(back2Geo, cushionMat(fc));
    back2.position.set(w/2 - backD/2 - 0.02, backY, 0);
    back2.castShadow = true;
    group.add(back2);
  } else {
    const backGeo = new THREE.BoxGeometry(w - seatInset*2, backH, backD, 4, 2, 1);
    const back = new THREE.Mesh(backGeo, cushionMat(fc));
    back.position.set(0, backY, backZ);
    back.castShadow = true; back.receiveShadow = true;
    group.add(back);
  }

  // Arms
  const armW = 0.1;
  const armD = d - 0.04;
  const armH = 0.3;
  const armY = baseH + armH / 2;

  if (hasLeftArm) {
    const armGeo = new THREE.BoxGeometry(armW, armH, armD, 2, 2, 2);
    const arm = new THREE.Mesh(armGeo, frameMat());
    arm.position.set(-w/2 + armW/2, armY, 0);
    arm.castShadow = true; arm.receiveShadow = true;
    group.add(arm);

    // Arm cushion
    const padGeo = new THREE.BoxGeometry(armW + 0.02, 0.06, armD - 0.08, 2, 1, 2);
    const pad = new THREE.Mesh(padGeo, cushionMat(fcLight));
    pad.position.set(-w/2 + armW/2, baseH + armH + 0.03, 0);
    pad.castShadow = true;
    group.add(pad);
  }

  if (hasRightArm) {
    const armGeo = new THREE.BoxGeometry(armW, armH, armD, 2, 2, 2);
    const arm = new THREE.Mesh(armGeo, frameMat());
    arm.position.set(w/2 - armW/2, armY, 0);
    arm.castShadow = true; arm.receiveShadow = true;
    group.add(arm);

    const padGeo = new THREE.BoxGeometry(armW + 0.02, 0.06, armD - 0.08, 2, 1, 2);
    const pad = new THREE.Mesh(padGeo, cushionMat(fcLight));
    pad.position.set(w/2 - armW/2, baseH + armH + 0.03, 0);
    pad.castShadow = true;
    group.add(pad);
  }

  // Legs - 4 per module
  const legH = 0.11;
  const legR = 0.045;
  for (let lx = -1; lx <= 1; lx += 2) {
    for (let lz = -1; lz <= 1; lz += 2) {
      const legGeo = new THREE.CylinderGeometry(legR * 0.7, legR, legH, 8);
      const leg = new THREE.Mesh(legGeo, legMat());
      leg.position.set(lx * (w/2 - 0.1), legH / 2, lz * (d/2 - 0.1));
      leg.castShadow = true;
      group.add(leg);
    }
  }

  return group;
}

// ============ Scene Management ============
function clearScene() {
  sceneObjects.forEach(obj => scene.remove(obj));
  sceneObjects = [];
}

function rebuildScene() {
  clearScene();
  if (addedModules.length === 0) return;

  // First pass: calculate layout positions
  const layout = [];
  let cx = 0, cz = 0;
  let direction = 'x'; // 'x' means extending along x-axis

  addedModules.forEach((type, index) => {
    const cfg = MODULES[type];
    const item = { type, index, pos: { x: 0, z: 0 }, rotY: 0 };

    if (type === 'corner') {
      item.pos.x = cx;
      item.pos.z = cz;
      item.rotY = -Math.PI / 2;
      cx = cx + cfg.w / 2 + cfg.d / 2;
      cz = cz - cfg.d / 2;
      direction = 'z';
    } else if (direction === 'z') {
      item.pos.x = cx;
      item.pos.z = cz;
      cz -= cfg.w;
    } else {
      item.pos.x = cx;
      item.pos.z = cz;
      cx += cfg.w;
    }

    layout.push(item);
  });

  // Calculate bounds and center
  let minX = Infinity, maxX = -Infinity;
  let minZ = Infinity, maxZ = -Infinity;
  layout.forEach(item => {
    const cfg = MODULES[item.type];
    const hw = cfg.w / 2, hd = cfg.d / 2;
    minX = Math.min(minX, item.pos.x - hw);
    maxX = Math.max(maxX, item.pos.x + hw);
    minZ = Math.min(minZ, item.pos.z - hd);
    maxZ = Math.max(maxZ, item.pos.z + hd);
  });
  const offsetX = -(minX + maxX) / 2;
  const offsetZ = -(minZ + maxZ) / 2;

  // Second pass: create and place
  layout.forEach(item => {
    const group = createModule3D(item.type);
    group.position.set(item.pos.x + offsetX, 0, item.pos.z + offsetZ);
    group.rotation.y = item.rotY;
    group.userData = { type: item.type, index: item.index };
    scene.add(group);
    sceneObjects.push(group);
  });

  // Update camera target to center
  controls.target.set(0, 0.4, 0);
  controls.update();
}

// ============ UI Updates ============
function updateUI() {
  document.getElementById('addedCount').textContent = addedModules.length;

  const addedList = document.getElementById('addedList');
  const total = addedModules.reduce((sum, type) => sum + MODULES[type].price, 0);

  if (addedModules.length === 0) {
    addedList.innerHTML = '<div style="text-align:center;padding:16px;color:#475569;font-size:12px">点击上方模块或加载预配置方案开始拼装</div>';
  } else {
    addedList.innerHTML = addedModules.map((type, i) => {
      const m = MODULES[type];
      return `<div class="added-item">
        <span class="item-icon">${m.icon}</span>
        <span class="item-name">${m.name}</span>
        <span class="item-price">$${m.price.toLocaleString()}</span>
        <button class="item-del" data-action="remove" data-index="${i}">×</button>
      </div>`;
    }).join('');
  }

  document.getElementById('totalPrice').textContent = '$' + total.toLocaleString();

  // Tags
  const tags = document.getElementById('moduleTags');
  tags.innerHTML = addedModules.map((type, i) => {
    const m = MODULES[type];
    return `<span class="module-tag">${m.icon} ${m.name}<span class="tag-del" data-action="remove" data-index="${i}">×</span></span>`;
  }).join('');
}

function addModule(type) {
  addedModules.push(type);
  updateUI();
  rebuildScene();
}

function removeModule(index) {
  addedModules.splice(index, 1);
  updateUI();
  rebuildScene();
}

function loadPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  addedModules = [...preset.modules];
  updateUI();
  rebuildScene();
}

// ============ Event Handlers ============
document.getElementById('moduleGrid').addEventListener('click', (e) => {
  const addBtn = e.target.closest('[data-action="add"]');
  if (addBtn) {
    addModule(addBtn.dataset.module);
    return;
  }
});

document.getElementById('addedList').addEventListener('click', (e) => {
  const delBtn = e.target.closest('[data-action="remove"]');
  if (delBtn) {
    removeModule(parseInt(delBtn.dataset.index));
  }
});

document.getElementById('moduleTags').addEventListener('click', (e) => {
  const delBtn = e.target.closest('[data-action="remove"]');
  if (delBtn) {
    removeModule(parseInt(delBtn.dataset.index));
  }
});

document.querySelectorAll('.preset-load').forEach(btn => {
  btn.addEventListener('click', () => {
    const presetName = btn.dataset.preset;
    const preset = PRESETS[presetName];
    if (addedModules.length > 0) {
      document.getElementById('confirmTitle').textContent = '加载预配置方案';
      document.getElementById('confirmBody').textContent = `将替换当前所有模块，加载"${preset.name}"（${preset.modules.length} 个模块）。是否继续？`;
      document.getElementById('confirmModal').classList.add('show');
      document.getElementById('confirmOk').onclick = () => {
        loadPreset(presetName);
        document.getElementById('confirmModal').classList.remove('show');
      };
    } else {
      loadPreset(presetName);
    }
  });
});

document.getElementById('confirmCancel').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('show');
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (addedModules.length === 0) return;
  document.getElementById('confirmTitle').textContent = '清空配置';
  document.getElementById('confirmBody').textContent = '将移除所有已添加的模块，此操作不可撤销。是否继续？';
  document.getElementById('confirmModal').classList.add('show');
  document.getElementById('confirmOk').onclick = () => {
    addedModules = [];
    updateUI();
    rebuildScene();
    document.getElementById('confirmModal').classList.remove('show');
  };
});

document.getElementById('btnCheckout').addEventListener('click', () => {
  if (addedModules.length === 0) {
    alert('请先添加模块');
    return;
  }
  const total = addedModules.reduce((sum, type) => sum + MODULES[type].price, 0);
  const items = addedModules.map(t => MODULES[t].name + ' - $' + MODULES[t].price.toLocaleString()).join('\n');
  document.getElementById('confirmTitle').textContent = '配置清单';
  document.getElementById('confirmBody').textContent = `模块明细:\n${items}\n\n预估总价: $${total.toLocaleString()}\n\n如需下单请联系客服。`;
  document.getElementById('confirmModal').classList.add('show');
  document.getElementById('confirmOk').textContent = '关闭';
  document.getElementById('confirmOk').onclick = () => {
    document.getElementById('confirmModal').classList.remove('show');
    document.getElementById('confirmOk').textContent = '确认';
  };
});

// Color swatches
document.getElementById('colorRow').addEventListener('click', (e) => {
  const swatch = e.target.closest('.color-swatch');
  if (!swatch) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');
  currentColor = swatch.dataset.color;
  rebuildScene();
});

// Toolbar
document.getElementById('btnTop').addEventListener('click', () => {
  camera.position.set(0, 8, 0.1);
  controls.target.set(0, 0.4, 0);
  controls.update();
});
document.getElementById('btnFront').addEventListener('click', () => {
  camera.position.set(0, 1.5, 7);
  controls.target.set(0, 0.4, 0);
  controls.update();
});
document.getElementById('btnSide').addEventListener('click', () => {
  camera.position.set(7, 1.5, 0);
  controls.target.set(0, 0.4, 0);
  controls.update();
});
document.getElementById('btnResetView').addEventListener('click', () => {
  camera.position.set(8, 5, 8);
  controls.target.set(0, 0.4, 0);
  controls.update();
});
document.getElementById('btnScreenshot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const dataURL = renderer.domElement.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = 'purple-leaf-config-' + Date.now() + '.png';
  link.href = dataURL;
  link.click();
});

// ============ Render Loop ============
function resize() {
  const rect = container.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height);
  camera.aspect = rect.width / Math.max(rect.height, 1);
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log('Purple Leaf 模块化配置器已就绪');
</script>
