th,td {padding:7px 10px;text-align:right;border-bottom:1px solid #e2e8f0;white-space:nowrap}
th {background:#f8fafc;color:#475569;font-weight:600;position:sticky;top:0;z-index:1}

var METRIC='total';
var HIGHLIGHTED=null;
var SHOW_COUNT=30;
var MAX_COUNT=CHART_DATA.length;

function getValues(item){
  if(METRIC==='total') return item.total_monthly;
  if(METRIC==='amazon_US') return item.amazon_US_monthly;
  if(METRIC==='shopify_US') return item.shopify_US_monthly;
  if(METRIC==='wayfair_US') return item.wayfair_US_monthly;
  if(METRIC==='homedepot') return item.homedepot_monthly;
  if(METRIC==='target') return item.target_monthly;
  if(METRIC==='overstock') return item.overstock_monthly;
  if(METRIC==='lowes') return item.lowes_monthly;
  if(METRIC==='walmart') return item.walmart_monthly;
  return item.total_monthly;
}
function getTotal(item){
  if(METRIC==='total') return item.total_sum;
  if(METRIC==='amazon_US') return item.amazon_US_sum;
  if(METRIC==='shopify_US') return item.shopify_US_sum;
  if(METRIC==='wayfair_US') return item.wayfair_US_sum;
  if(METRIC==='homedepot') return item.homedepot_sum;
  if(METRIC==='target') return item.target_sum;
  if(METRIC==='overstock') return item.overstock_sum;
  if(METRIC==='lowes') return item.lowes_sum;
  if(METRIC==='walmart') return item.walmart_sum;
  return item.total_sum;
}

SHOW_COUNT=30;
MAX_COUNT=35;

var canvas=document.getElementById('mainChart');
var ctx=canvas.getContext('2d');
var W,H;

function resize(){
  var wrap=canvas.parentElement;
  var w=wrap.clientWidth;
  var ratio=window.devicePixelRatio||1;
  canvas.width=w*ratio;
  canvas.height=550*ratio;
  canvas.style.width=w+'px';
  canvas.style.height='550px';
  ctx.setTransform(ratio,0,0,ratio,0,0);
  W=w; H=550;
  drawChart();
}

function drawChart(){
  ctx.clearRect(0,0,W*2,H*2);
  var items=[];
  for(var i=0;i<MAX_COUNT;i++){
    if(i>=CHART_DATA.length) break;
    items.push(CHART_DATA[i]);
    if(items.length>=SHOW_COUNT) break;
  }
  if(items.length===0){
    ctx.fillStyle='#94a3b8'; ctx.font='14px sans-serif';
    ctx.textAlign='center'; ctx.fillText('暂无数据',W/2,H/2);
    return;
  }
  var pad={top:40,right:30,bottom:60,left:70};
  var pw=W-pad.left-pad.right;
  var ph=H-pad.top-pad.bottom;
  var months=['1月','2月','3月','4月','5月'];
  
  // Find Y range
  var maxY=0;
  items.forEach(function(it){
    var vals=getValues(it);
    vals.forEach(function(v){if(v>maxY) maxY=v;});
  });
  if(maxY===0) maxY=10;
  var ySteps=5;
  var yStep=Math.ceil(maxY/ySteps/100)*100;
  if(yStep===0) yStep=Math.ceil(maxY/ySteps/10)*10;
  if(yStep===0) yStep=1;
  maxY=yStep*ySteps;
  
  // Grid
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
  ctx.fillStyle='#94a3b8'; ctx.font='11px sans-serif'; ctx.textAlign='right';
  for(var i=0;i<=ySteps;i++){
    var y=pad.top+(ph/ySteps)*i;
    var val=maxY-(maxY/ySteps)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillText(Math.round(val).toLocaleString(),pad.left-8,y+4);
  }
  
  // X labels
  ctx.textAlign='center'; ctx.fillStyle='#64748b';
  for(var i=0;i<5;i++){
    var x=pad.left+(pw/4)*i;
    ctx.fillText(months[i],x,H-pad.bottom+20);
  }
  
  // Lines
  items.forEach(function(it,idx){
    var vals=getValues(it);
    var color='#7C189F';
    var alpha=(HIGHLIGHTED&&HIGHLIGHTED!==it.name)?0.15:1;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=color; ctx.lineWidth=(HIGHLIGHTED===it.name)?4:2.8;
    ctx.beginPath();
    for(var i=0;i<5;i++){
      var x=pad.left+(pw/4)*i;
      var y=pad.top+ph-(vals[i]/maxY)*ph;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // Dots
    for(var i=0;i<5;i++){
      var x=pad.left+(pw/4)*i;
      var y=pad.top+ph-(vals[i]/maxY)*ph;
      ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,4.5,0,Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha=1;
  
  // Legend
  var legendDiv=document.getElementById('legendGrid');
  var html='';
  items.forEach(function(it,idx){
    var color='#7C189F';
    var cls=HIGHLIGHTED?(HIGHLIGHTED===it.name?' active':' dimmed'):'';
    html+='<div class="legend-item'+cls+'" onclick="toggleLegend(\''+it.name.replace(/'/g,"\'")+'\')">';
    html+='<span class="legend-dot" style="background:'+color+'"></span>';
    html+=it.name+'</div>';
  });
  legendDiv.innerHTML=html;
  
  document.getElementById('lineCount').textContent='显示 '+items.length+' / '+MAX_COUNT;
}

function toggleLegend(name){
  HIGHLIGHTED=(HIGHLIGHTED===name)?null:name;
  drawChart();
}

function buildTable(){
  var items=[];
  for(var i=0;i<CHART_DATA.length;i++){
    var it=CHART_DATA[i];
    items.push({
      name:it.name,
      month1:getValues(it)[0],
      month2:getValues(it)[1],
      month3:getValues(it)[2],
      month4:getValues(it)[3],
      month5:getValues(it)[4],
      total:getTotal(it),
      mom:it.mom
    });
  }
  items.sort(function(a,b){return b.total-a.total;});
  var h='<thead><tr>';
  h+='<th>#</th><th>品类名称</th>';
  h+='<th>1月销量</th><th>2月销量</th><th>3月销量</th><th>4月销量</th><th>5月销量</th>';
  h+='<th>合计</th>';
  h+='</tr></thead><tbody>';
  
  var rank=1,prevTotal=-1,displayRank=1;
  items.forEach(function(it,idx){
    if(it.total!==prevTotal){displayRank=rank;}
    prevTotal=it.total;
    h+='<tr>';
    h+='<td>'+displayRank+'</td>';
    h+='<td>'+it.name+'</td>';
    h+='<td>'+it.month1.toLocaleString()+'</td>';
    h+='<td>'+it.month2.toLocaleString()+'</td>';
    h+='<td>'+it.month3.toLocaleString()+'</td>';
    h+='<td>'+it.month4.toLocaleString()+'</td>';
    h+='<td>'+it.month5.toLocaleString()+'</td>';
    h+='<td>'+Math.round(it.total).toLocaleString()+'</td>';
    h+='</tr>';
    rank++;
  });
  h+='</tbody>';
  document.getElementById('rankTable').innerHTML=h;
}

function setShowCount(n){
  SHOW_COUNT=n; MAX_COUNT=n;
  document.querySelectorAll('.toolbar button').forEach(function(b){b.classList.remove('active');});
  var btnId='btnAll';
  if(n===30) btnId='btnTop30';
  else if(n===50) btnId='btnTop50';
  else if(n===100) btnId='btnTop100';
  var btn=document.getElementById(btnId);
  if(btn) btn.classList.add('active');
  drawChart();
}

function redrawChart(){drawChart();}

canvas.addEventListener('click',function(e){if(e.target===canvas){HIGHLIGHTED=null;drawChart();}});
window.addEventListener('resize',resize);

resize();
buildTable();
</script>
