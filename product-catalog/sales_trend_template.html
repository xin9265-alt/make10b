<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#f0f2f5;color:#333;line-height:1.6;padding:16px;max-width:960px;margin:0 auto}
.header{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.header-img{width:100px;height:100px;object-fit:contain;border-radius:8px;background:#fafafa;flex-shrink:0}
.header-info{flex:1;min-width:200px}
.header-info h1{font-size:18px;color:#1f2937;margin-bottom:4px;line-height:1.3}
.header-sku{font-size:12px;color:#888;margin-bottom:4px}
.header-price{font-size:22px;font-weight:700;color:#dc2626}
.back-link{display:inline-block;margin-bottom:16px;color:#2563eb;text-decoration:none;font-size:14px}
.back-link:hover{text-decoration:underline}
.source{background:#eff6ff;color:#1e40af;padding:8px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
.chart-section{background:#fff;border-radius:12px;padding:20px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-section h2{font-size:16px;color:#1f2937;margin-bottom:8px;text-align:center}
.chart-wrap{width:100%;max-width:880px;margin:0 auto}
.chart-wrap canvas{width:100%;height:auto;display:block}
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 12px;margin:10px 0 0;padding:0;list-style:none;font-size:12px}
.legend li{display:flex;align-items:center;gap:4px;cursor:default;user-select:none}
.legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend .lbl{color:#4b5563}
.legend .total-dot{width:18px;height:3px;border-radius:2px;flex-shrink:0}
.table-wrap{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-wrap h2{font-size:16px;color:#1f2937;margin-bottom:12px}
table{width:100%;min-width:700px;border-collapse:collapse;font-size:13px;white-space:nowrap}
th,td{padding:8px 10px;text-align:center;border-bottom:1px solid #e5e7eb}
th{background:#f8fafc;color:#6b7280;font-weight:600;font-size:11px}
td{color:#374151}
.td-total{font-weight:700;background:#f8fafc}
.rate-up{color:#10b981;font-weight:600}
.rate-down{color:#dc2626;font-weight:600}
.rate-flat{color:#6b7280}
.summary-row{background:#f0fdf4}
.summary-row td{color:#065f46;font-weight:700}
.no-data{text-align:center;color:#9ca3af;padding:40px 16px;font-size:15px}
@media(max-width:600px){
.header{flex-direction:column;align-items:flex-start}
.header-img{width:80px;height:80px}
.header-info h1{font-size:15px}
.header-price{font-size:18px}
th,td{padding:6px 6px;font-size:11px}
}

</style>
</script>

var MONTH_LABELS = ['2026年1月','2026年2月','2026年3月','2026年4月','2026年5月'];
var PLATFORMS = ['amazon_US','shopify_US','wayfair_US','homedepot','target','overstock','lowes','walmart'];
var PLATFORM_NAMES = {amazon_US:'Amazon US',shopify_US:'Shopify US',wayfair_US:'Wayfair US',homedepot:'Home Depot',target:'Target',overstock:'Overstock',lowes:'Lowes',walmart:'Walmart'};
var COLORS = {
  total:   {line:'#2563eb',fill:'rgba(37,99,235,0.08)',w:3},
  amazon_US:{line:'#f59e0b',fill:'rgba(245,158,11,0.06)',w:1.5},
  shopify_US:{line:'#10b981',fill:'rgba(16,185,129,0.06)',w:1.5},
  wayfair_US:{line:'#8b5cf6',fill:'rgba(139,92,246,0.06)',w:1.5},
  homedepot:{line:'#ef4444',fill:'rgba(239,68,68,0.06)',w:1.5},
  target:  {line:'#ec4899',fill:'rgba(236,72,153,0.06)',w:1.5},
  overstock:{line:'#06b6d4',fill:'rgba(6,182,212,0.06)',w:1.5},
  lowes:   {line:'#f97316',fill:'rgba(249,115,22,0.06)',w:1.5},
  walmart: {line:'#6366f1',fill:'rgba(99,102,241,0.06)',w:1.5}
};

(function(){
var params = new URLSearchParams(window.location.search);
var sku = params.get('sku') || '';
var name = params.get('name') || 'Unknown Product';
var price = params.get('price') || '0';
var img = params.get('img') || '';

if (!sku) {
  document.getElementById('app').innerHTML = '<div class="no-data">缺少 SKU 参数</div>';
  return;
}

var priceNum = parseFloat(price) || 0;
var priceStr = '$' + priceNum.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
var entry = SALES_DB[sku];

var html = '';
html += '<div class="header">';
if (img) html += '<img class="header-img" src="' + img + '" alt="' + name + '" loading="lazy">';
html += '<div class="header-info"><h1>' + name + '</h1><div class="header-sku">SKU: ' + sku + '</div><div class="header-price">' + priceStr + '</div></div></div>';

if (!entry) {
  html += '<div class="no-data">该SKU暂无销量数据</div>';
  document.getElementById('app').innerHTML = html;
  return;
}

var total = entry.total;
var allZero = total.every(function(v){return v===0;});
if (allZero) {
  html += '<div class="no-data">该SKU暂无销量数据（近5个月销量均为0）</div>';
  document.getElementById('app').innerHTML = html;
  return;
}

html += '<div class="source">数据来源：2026年5月US核心SKU销量月统计</div>';

// ---- Chart ----
html += '<div class="chart-section"><h2>2026年1-5月US销量趋势</h2>';
html += '<div class="chart-wrap"><canvas id="salesChart" width="880" height="400"></canvas></div>';
html += '<ul class="legend"><li><span class="total-dot" style="background:#2563eb"></span><span class="lbl"><b>总销量</b></span></li>';
for (var pi = 0; pi < PLATFORMS.length; pi++) {
  var p = PLATFORMS[pi];
  var c = COLORS[p];
  html += '<li><span class="dot" style="background:' + c.line + '"></span><span class="lbl">' + PLATFORM_NAMES[p] + '</span></li>';
}
html += '</ul></div>';

// ---- Table ----
html += '<div class="table-wrap"><h2>月度销量明细</h2>';
html += '<table><thead><tr><th>月份</th><th>总销量</th>';
for (var pi = 0; pi < PLATFORMS.length; pi++) {
  html += '<th>' + PLATFORM_NAMES[PLATFORMS[pi]] + '</th>';
}
html += '<th>环比</th></tr></thead><tbody>';

var grandTotal = 0;
var platformTotals = {};
for (var pi = 0; pi < PLATFORMS.length; pi++) platformTotals[PLATFORMS[pi]] = 0;

for (var m = 0; m < total.length; m++) {
  grandTotal += total[m];
  for (var pi = 0; pi < PLATFORMS.length; pi++) {
    platformTotals[PLATFORMS[pi]] += entry[PLATFORMS[pi]][m];
  }
  
  var change = '', changeCls = 'rate-flat';
  if (m > 0 && total[m-1] > 0) {
    var diff = total[m] - total[m-1];
    change = (diff>=0?'+':'') + ((diff/total[m-1])*100).toFixed(1) + '%';
    changeCls = diff>0?'rate-up':(diff<0?'rate-down':'rate-flat');
  } else if (m === 0) {
    change = '-';
  } else {
    change = '+∞'; changeCls = 'rate-up';
  }
  
  html += '<tr><td>' + MONTH_LABELS[m] + '</td>';
  html += '<td class="td-total">' + total[m] + '</td>';
  for (var pi = 0; pi < PLATFORMS.length; pi++) {
    html += '<td>' + entry[PLATFORMS[pi]][m] + '</td>';
  }
  html += '<td class="' + changeCls + '">' + change + '</td></tr>';
}

// Summary row
html += '<tr class="summary-row"><td><b>合计</b></td><td class="td-total">' + grandTotal + '</td>';
for (var pi = 0; pi < PLATFORMS.length; pi++) {
  html += '<td>' + platformTotals[PLATFORMS[pi]] + '</td>';
}
html += '<td>&mdash;</td></tr>';
html += '</tbody></table></div>';

var avg = (grandTotal / total.length).toFixed(1);
html += '<div style="text-align:center;color:#6b7280;font-size:13px;margin-bottom:16px">月均总销量：' + avg + ' 件</div>';

document.getElementById('app').innerHTML = html;

// ---- Draw Canvas Chart ----
setTimeout(function(){
  var canvas = document.getElementById('salesChart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  var W = rect.width, H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  var pad = {top:30, right:30, bottom:55, left:55};
  var plotW = W - pad.left - pad.right;
  var plotH = H - pad.top - pad.bottom;

  // Calculate max value across all series
  var maxV = 0;
  for (var m = 0; m < total.length; m++) {
    if (total[m] > maxV) maxV = total[m];
  }
  maxV = Math.ceil(maxV * 1.25) || 10;
  if (maxV < 5) maxV = 5;

  // Grid
  var gridLines = 5;
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 0.5;
  for (var g = 0; g <= gridLines; g++) {
    var gy = pad.top + (plotH / gridLines) * g;
    ctx.beginPath();
    ctx.moveTo(pad.left, gy);
    ctx.lineTo(W - pad.right, gy);
    ctx.stroke();
    var val = Math.round(maxV * (1 - g / gridLines));
    ctx.fillStyle = '#9ca3af';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val, pad.left - 8, gy + 4);
  }

  // Axes
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, H - pad.bottom);
  ctx.lineTo(W - pad.right, H - pad.bottom);
  ctx.stroke();

  function getX(i) { return pad.left + (plotW / (total.length - 1)) * i; }
  function getY(v) { return pad.top + plotH - (v / maxV) * plotH; }

  // X labels
  for (var i = 0; i < total.length; i++) {
    ctx.fillStyle = '#9ca3af';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText((i+1)+'月', getX(i), H - pad.bottom + 16);
  }

  // Draw all platform lines first (thin), then total (thick on top)
  var seriesList = [];
  for (var pi = 0; pi < PLATFORMS.length; pi++) {
    seriesList.push({key: PLATFORMS[pi], data: entry[PLATFORMS[pi]], style: COLORS[PLATFORMS[pi]]});
  }
  seriesList.push({key: 'total', data: total, style: COLORS.total});

  // Draw platform series
  for (var si = 0; si < seriesList.length; si++) {
    var ser = seriesList[si];
    var sdata = ser.data;
    var sty = ser.style;
    var points = [];
    for (var i = 0; i < sdata.length; i++) {
      points.push({x: getX(i), y: getY(sdata[i])});
    }
    
    if (points.length < 2) continue;
    
    // Line
    ctx.strokeStyle = sty.line;
    ctx.lineWidth = sty.w;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (var i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
    
    // Dots
    for (var i = 0; i < points.length; i++) {
      var r = ser.key === 'total' ? 4.5 : 3;
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = sty.line;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(points[i].x, points[i].y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }

  // Total line value labels on top
  var tpoints = [];
  for (var i = 0; i < total.length; i++) tpoints.push({x: getX(i), y: getY(total[i])});
  for (var i = 0; i < tpoints.length; i++) {
    ctx.fillStyle = '#1e40af';
    ctx.font = 'bold 10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(total[i], tpoints[i].x, tpoints[i].y - 12);
  }
}, 100);

})();
</script>
